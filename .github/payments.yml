# Arbor Sponsorship and Payments Configuration
# Defines tiers, payment endpoints, and sponsorship routing for GitHub Sponsors

github_sponsorships:
  username: Anandb71
  url: https://github.com/sponsors/Anandb71
  enabled: true

payment_providers:
  stripe:
    enabled: true
    project_billing_url: "https://billing.stripe.com/p/session/arbor_sponsorship"
  opencollective:
    enabled: true
    slug: arbor-graph
    url: "https://opencollective.com/arbor-graph"
  kofi:
    enabled: true
    url: "https://ko-fi.com/arbor_graph"
  patreon:
    enabled: false
    url: ""

sponsorship_tiers:
  - id: tier_backer
    name: "Backer"
    amount_monthly: 5
    description: "Support the continuous development of Arbor and get a badge on the repository."
    benefits:
      - "Sponsor badge on README"
      - "Support priority for open issues"
  
  - id: tier_pro
    name: "Professional Sponsor"
    amount_monthly: 25
    description: "For professional developers using Arbor in their daily workflows."
    benefits:
      - "All Backer benefits"
      - "24-hour response SLA on issue reports"
      - "Arbor Discord Private Sponsor Channel access"

  - id: tier_enterprise
    name: "Enterprise Sponsor"
    amount_monthly: 250
    description: "For organizations running Arbor PR Bots across their engineering team."
    benefits:
      - "All Pro benefits"
      - "Private Slack/Discord support channel"
      - "1-on-1 architecture review & setup support"
      - "Company logo displayed on README and official website"
