name: Arbor Action Smoke Test

on:
  workflow_dispatch:
    inputs:
      command:
        description: Arbor subcommand and args (without leading 'arbor')
        required: false
        default: status .
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Arbor action (local)
        uses: ./
        with:
          install-from-source: "true"
          command: ${{ github.event.inputs.command || 'status .' }}