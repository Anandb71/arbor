name: Arbor PR Bot - Blast Radius & Governance

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  arbor-impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # For full git history/impact

      - name: Run Arbor Action
        uses: ./
        with:
          install-from-source: "true"
          command: "diff . --markdown"
          comment-on-pr: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
