name: Arbor PR Bot - Blast Radius & Governance

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  arbor-impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # For full git history/impact

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build and install Arbor from source
        run: cargo install --path crates/arbor-cli --force

      - name: Run Arbor diff and capture report
        shell: bash
        run: arbor diff . > arbor-impact.md 2>&1 || true

      - name: Post Blast Radius Comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let impact = 'No impact report generated.';
            try { impact = fs.readFileSync('arbor-impact.md', 'utf8'); } catch (_) {}
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Arbor Graph Impact Report\n\n**Blast Radius:** High-centrality nodes affected?\n\n${impact}\n\n*Powered by [Arbor](https://github.com/${context.repo.owner}/${context.repo.repo}) — semantic code graph engine.*`
            });
