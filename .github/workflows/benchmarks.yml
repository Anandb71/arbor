name: Benchmarks

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: Criterion benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # Exclude criterion baselines — stale baselines cause false regressions on CI.
          cache-targets: false

      - name: Run Criterion benchmarks
        run: |
          rm -rf target/criterion
          cargo bench -p arbor-graph --bench graph_bench -- --noplot
