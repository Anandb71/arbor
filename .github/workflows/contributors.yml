name: Update Contributors

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

concurrency:
  group: contributors-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh-contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Update contributors block in README
        shell: pwsh
        run: ./scripts/update_contributors.ps1 -Repo "${{ github.repository }}" -ReadmePath "README.md" -MaxContributors 15

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No contributor updates needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): refresh contributors list"
          git pull --rebase origin main
          git push origin main