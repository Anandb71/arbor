name: Update Contributors

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: contributors-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh-contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Update contributors block in README
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/update_contributors.ps1 -Repo "${{ github.repository }}" -ReadmePath "README.md" -MaxContributors 15 -Token $env:GITHUB_TOKEN

      - name: Detect README changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No README contributor changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "README contributor block changed."
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: docs(readme): refresh contributors list
          branch: chore/refresh-contributors
          base: main
          title: docs(readme): refresh contributors list
          body: |
            Automated contributors refresh.

            This PR is generated by the contributors workflow to keep the README contributor block current.
          delete-branch: true
          add-paths: |
            README.md

      - name: Skip notice
        if: steps.changes.outputs.has_changes != 'true'
        run: echo "Contributors are already up to date; skipping PR creation."
