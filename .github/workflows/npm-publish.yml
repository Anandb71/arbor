name: Publish NPM Wrapper

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2.4.0). Required for manual retry."
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: npm-publish-${{ github.event.workflow_run.head_branch || github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve release tag
        id: release_tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
          else
            TAG="$(gh release view --json tagName -q .tagName 2>/dev/null || true)"
          fi

          if [ -z "$TAG" ] || ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Could not resolve a valid release tag (got: '${TAG:-empty}')"
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify release binaries exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.release_tag.outputs.tag }}"
          COUNT="$(gh release view "$TAG" --json assets -q '.assets | length')"
          if [ "$COUNT" -lt 5 ]; then
            echo "::error::Release $TAG has $COUNT binary assets (expected 5). npm postinstall downloads from GitHub Releases."
            exit 1
          fi
          echo "Release $TAG has $COUNT assets — OK"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify package metadata
        working-directory: packaging/npm
        run: npm pkg get name version

      - name: Apply release version to npm package
        working-directory: packaging/npm
        run: npm version "${{ steps.release_tag.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: packaging/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.release_tag.outputs.version }}"
          PKG="@anandb71/arbor-cli"

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN not set; skipping publish."
            exit 0
          fi

          echo "Checking npm auth..."
          npm whoami || { echo "::error::NPM_TOKEN is invalid or expired. Regenerate at https://www.npmjs.com/"; exit 1; }

          if npm view "${PKG}@${VERSION}" version >/dev/null 2>&1; then
            echo "npm ${PKG}@${VERSION} already published — skipping."
            exit 0
          fi

          npm publish --access public
