name: Publish NPM Wrapper

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm wrapper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify package metadata
        working-directory: packaging/npm
        run: |
          npm pkg get name version

      - name: Resolve publish version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${{ github.event.release.tag_name }}" | sed 's/^value=v/value=/' >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply release version to npm package
        if: steps.version.outputs.value != ''
        working-directory: packaging/npm
        run: npm version "${{ steps.version.outputs.value }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: packaging/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set; skipping publish."
            exit 0
          fi

          npm publish --access public