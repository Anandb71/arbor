name: Publish VS Code Extension

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2.4.0). Required for manual retry."
        required: false
        type: string
      version:
        description: "Optional version bump (patch | minor | major | x.y.z). Leave empty to use release tag."
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: publish-vscode-extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish extension registries
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))

    defaults:
      run:
        working-directory: extensions/arbor-vscode

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extensions/arbor-vscode/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Debug extension metadata
        run: |
          node -e "const p=require('./package.json'); console.log('version=',p.version,'icon=',p.icon)"
          test -f arbor-logo.png && echo "Found arbor-logo.png"
          test -f extension/arbor-logo.png && echo "Found extension/arbor-logo.png (compat)" || true

      - name: Compile extension
        run: npm run compile

      - name: Install publish CLIs
        run: npm install -g @vscode/vsce ovsx

      - name: Resolve publish version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version }}"
          DISPATCH_TAG="${{ github.event.inputs.tag }}"

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            SKIP="false"
          elif [ -n "$DISPATCH_TAG" ]; then
            VERSION="${DISPATCH_TAG#v}"
            SKIP="false"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            RELEASE_VERSION="${{ github.event.workflow_run.head_branch }}"
            RELEASE_VERSION="${RELEASE_VERSION#v}"
            if echo "$RELEASE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              VERSION="$RELEASE_VERSION"
              SKIP="false"
            else
              VERSION=""
              SKIP="true"
              echo "::warning::Skipping VS Code publish because tag '$RELEASE_VERSION' is not semver."
            fi
          else
            VERSION=""
            SKIP="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

      - name: Apply release version to package.json
        if: steps.version.outputs.version != ''
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Package extension artifact
        if: steps.version.outputs.skip != 'true'
        run: vsce package --out arbor-vscode.vsix

      - name: Validate publishing token presence
        if: steps.version.outputs.skip != 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ] && [ -z "$OVSX_PAT" ]; then
            echo "No publish token found. Add VSCE_PAT and/or OVSX_PAT in repository settings."
            exit 1
          fi

      - name: Publish to VS Code Marketplace
        if: steps.version.outputs.skip != 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT not set; skipping VS Code Marketplace publish."
            exit 0
          fi
          vsce publish --packagePath arbor-vscode.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: steps.version.outputs.skip != 'true'
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::warning::OVSX_PAT not set; skipping Open VSX publish."
            exit 0
          fi

          PUBLISHER="$(node -p "require('./package.json').publisher")"
          ovsx create-namespace "$PUBLISHER" --pat "$OVSX_PAT" || true
          if ovsx publish arbor-vscode.vsix --pat "$OVSX_PAT"; then
            echo "Open VSX publish succeeded."
          else
            echo "::warning::Open VSX publish failed (non-blocking). VS Code Marketplace is the primary channel."
            exit 0
          fi
