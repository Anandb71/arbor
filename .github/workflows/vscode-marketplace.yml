name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version bump (patch | minor | major | x.y.z). Leave empty to publish current package.json version."
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: extensions/arbor-vscode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/arbor-vscode/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile extension
        run: npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "Missing VSCE_PAT secret. Add it in repository Settings > Secrets and variables > Actions."
            exit 1
          fi

          if [ -n "$INPUT_VERSION" ]; then
            vsce publish "$INPUT_VERSION" --pat "$VSCE_PAT"
          else
            vsce publish --pat "$VSCE_PAT"
          fi