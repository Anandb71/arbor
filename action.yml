name: Arbor Impact Analysis
description: Run Arbor graph-native code impact analysis in GitHub Actions.
branding:
  icon: git-branch
  color: blue

inputs:
  command:
    description: Arbor command to run (without leading 'arbor'). For example 'diff .' or 'status .'.
    required: false
    default: status .
  arbor-version:
    description: Arbor CLI version to install (e.g. 1.6.2). Use 'latest' for newest.
    required: false
    default: latest
  install-from-source:
    description: Install from this repository source using Cargo instead of crates.io.
    required: false
    default: "false"
  working-directory:
    description: Directory where the Arbor command should run.
    required: false
    default: .
  comment-on-pr:
    description: "Post the impact report as a comment on the Pull Request when running in a PR workflow."
    required: false
    default: "true"
  github-token:
    description: "The GITHUB_TOKEN secret, needed to post PR comments."
    required: false
    default: "${{ github.token }}"

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install Arbor CLI
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ inputs.install-from-source }}" == "true" ]]; then
          cargo install --path crates/arbor-cli --force
        elif [[ "${{ inputs.arbor-version }}" == "latest" ]]; then
          cargo install arbor-graph-cli --force
        else
          cargo install arbor-graph-cli --version "${{ inputs.arbor-version }}" --force
        fi

    - name: Run Arbor and Comment on PR
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        set -euo pipefail
        cd "${{ inputs.working-directory }}"
        
        # 1. Set environment variables for pull requests to specify diff range
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          export ARBOR_DIFF_BASE="$PR_BASE_SHA"
          export ARBOR_DIFF_HEAD="$PR_HEAD_SHA"
          echo "PR environment detected. Range set: $ARBOR_DIFF_BASE ... $ARBOR_DIFF_HEAD"
          
          # Ensure base and head SHAs are fetched and accessible locally for git diff
          if ! git rev-parse --verify "$ARBOR_DIFF_BASE" >/dev/null 2>&1; then
            echo "Fetching base SHA: $ARBOR_DIFF_BASE"
            git fetch --depth=100 origin "$ARBOR_DIFF_BASE" || git fetch origin "$ARBOR_DIFF_BASE" || true
          fi
          if ! git rev-parse --verify "$ARBOR_DIFF_HEAD" >/dev/null 2>&1; then
            echo "Fetching head SHA: $ARBOR_DIFF_HEAD"
            git fetch --depth=100 origin "$ARBOR_DIFF_HEAD" || git fetch origin "$ARBOR_DIFF_HEAD" || true
          fi
        fi

        # 2. Run the normal user-supplied command
        echo "Running: arbor ${{ inputs.command }}"
        arbor ${{ inputs.command }}
        
        # 3. Check if we should post a PR comment
        if [[ "${{ inputs.comment-on-pr }}" == "true" && "${{ github.event_name }}" == "pull_request" ]]; then
          echo "Generating Arbor Impact Report for PR comment..."
          
          # Initialize Arbor if needed to ensure we have a valid index
          arbor init . || true
          arbor index . || true
          
          # Run diff with markdown and capture output
          arbor diff . --markdown > arbor_report.md || true
          
          if [ -f arbor_report.md ] && [ -s arbor_report.md ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            echo "Looking for existing Arbor comments on PR #$PR_NUMBER..."
            
            # Find existing comment from Arbor using GH CLI
            COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/$PR_NUMBER/comments \
              --jq '.[] | select(.body | contains("## 🌳 Arbor Impact Report") or contains("## 🌳 Arbor Safety Check")) | .id' | head -n 1 2>/dev/null || true)
              
            if [ -n "$COMMENT_ID" ]; then
              echo "Updating existing PR comment #$COMMENT_ID..."
              gh api -X PATCH repos/${{ github.repository }}/issues/comments/$COMMENT_ID -F body=@arbor_report.md > /dev/null || echo "Warning: Failed to update existing PR comment."
            else
              echo "Creating a new PR comment..."
              gh pr comment "$PR_NUMBER" --body-file arbor_report.md > /dev/null || echo "Warning: Failed to create new PR comment."
            fi
            
            rm -f arbor_report.md
          else
            echo "No impact report generated or file was empty."
          fi
        fi